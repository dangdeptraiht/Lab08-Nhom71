# Worker Contracts — Day 09 Lab
# Định nghĩa input/output rõ ràng cho từng worker.
# Supervisor và workers phải tuân theo contract này.
#
# Rule: Supervisor giữ quyết định luồng. Worker giữ domain skill.
#       Contract là ranh giới rõ ràng giữa hai bên.
#
# TODO Sprint 2: Cập nhật "actual_implementation" khi đã implement xong.

version: "1.0"
updated_at: "2026-04-13"

# ─────────────────────────────────────────────
# Supervisor
# ─────────────────────────────────────────────

supervisor:
  name: supervisor
  description: "Phân tích task và quyết định route. KHÔNG tự trả lời domain knowledge."
  input:
    task:
      type: string
      required: true
      description: "Câu hỏi từ user"
  output:
    supervisor_route:
      type: string
      enum: ["retrieval_worker", "policy_tool_worker", "human_review"]
      required: true
    route_reason:
      type: string
      required: true
      description: "Lý do cụ thể tại sao chọn route này (không được để 'unknown')"
    risk_high:
      type: boolean
      required: true
    needs_tool:
      type: boolean
      required: true
  routing_rules:
    - condition: "task chứa 'hoàn tiền', 'refund', 'flash sale', 'license', 'cấp quyền', 'access level'"
      route: "policy_tool_worker"
    - condition: "task chứa 'P1', 'SLA', 'ticket', 'escalation', 'sự cố'"
      route: "retrieval_worker"
    - condition: "task chứa mã lỗi không rõ (ERR-xxx) VÀ không có context"
      route: "human_review"
    - condition: "default"
      route: "retrieval_worker"
  constraints:
    - "Supervisor không được tự trả lời policy questions"
    - "route_reason KHÔNG được là chuỗi rỗng hoặc 'unknown'"
    - "Nếu risk_high=True → luôn ghi lý do cụ thể"

# ─────────────────────────────────────────────
# Retrieval Worker
# ─────────────────────────────────────────────

retrieval_worker:
  name: retrieval_worker
  file: workers/retrieval.py
  description: "Tìm kiếm chunks bằng chứng từ Knowledge Base. Stateless — test độc lập được."
  input:
    task:
      type: string
      required: true
      description: "Câu hỏi cần tìm evidence"
    top_k:
      type: integer
      required: false
      default: 3
      description: "Số chunks cần retrieve"
  output:
    retrieved_chunks:
      type: array
      required: true
      description: "List of chunk objects"
      items:
        text: string
        source: string
        score: float  # 0.0 - 1.0 (cosine similarity)
        metadata: object
    retrieved_sources:
      type: array
      required: true
      description: "Unique list of source filenames"
    worker_io_logs:
      type: array
      required: true
      description: "Log input/output của worker (append to array)"
  error_format:
    code: "RETRIEVAL_FAILED"
    reason: string
  constraints:
    - "Phải trả về ít nhất 1 chunk nếu tìm thấy"
    - "Nếu không tìm thấy → retrieved_chunks=[] (không trả về fake chunks)"
    - "Score phải là float trong khoảng [0, 1]"
    - "Stateless: không đọc hoặc ghi state ngoài những gì được khai báo ở trên"
  actual_implementation:
    status: "DONE Sprint 2"  # Update to "done" khi xong
    notes: ""

# ─────────────────────────────────────────────
# Policy Tool Worker
# ─────────────────────────────────────────────

policy_tool_worker:
  name: policy_tool_worker
  file: workers/policy_tool.py
  description: "Kiểm tra policy và xử lý exceptions. Có thể gọi MCP tools khi cần."
  input:
    task:
      type: string
      required: true
    retrieved_chunks:
      type: array
      required: false
      description: "Context từ retrieval_worker (nếu đã có)"
    needs_tool:
      type: boolean
      required: false
      default: false
      description: "True → worker được phép gọi MCP tools"
  output:
    policy_result:
      type: object
      required: true
      properties:
        policy_applies:
          type: boolean
          description: "True nếu policy cho phép, False nếu bị chặn"
        policy_name:
          type: string
          example: "refund_policy_v4"
        exceptions_found:
          type: array
          description: "Danh sách exceptions tìm thấy"
          items:
            type: object
            properties:
              type: string  # e.g., "flash_sale_exception"
              rule: string  # Câu policy rule cụ thể
              source: string
        source:
          type: array
          description: "Nguồn tài liệu đã dùng"
        policy_version_note:
          type: string
          description: "Note về version nếu có vấn đề temporal scoping"
    mcp_tools_used:
      type: array
      description: "Danh sách MCP tool calls thực hiện"
      items:
        tool: string
        input: object
        output: object
        error: object | null
        timestamp: string
    worker_io_logs:
      type: array
      required: true
  error_format:
    code: "POLICY_CHECK_FAILED"
    reason: string
  constraints:
    - "Phải detect exception cases: flash_sale, digital_product, activated_product"
    - "Phải ghi tên MCP tool đã gọi vào mcp_tools_used"
    - "Không được tự bịa policy rules không có trong tài liệu"
  actual_implementation:
    status: "DONE Sprint 2"
    notes: ""

# ─────────────────────────────────────────────
# Synthesis Worker
# ─────────────────────────────────────────────

synthesis_worker:
  name: synthesis_worker
  file: workers/synthesis.py
  description: "Tổng hợp câu trả lời từ evidence. Gọi LLM với grounded prompt."
  input:
    task:
      type: string
      required: true
    retrieved_chunks:
      type: array
      required: false
      description: "Evidence từ retrieval_worker"
    policy_result:
      type: object
      required: false
      description: "Policy check result từ policy_tool_worker"
  output:
    final_answer:
      type: string
      required: true
      description: "Câu trả lời cuối có citation"
    sources:
      type: array
      required: true
      description: "Sources được cite trong answer"
    confidence:
      type: float
      required: true
      description: "Mức độ tin cậy 0.0-1.0"
    worker_io_logs:
      type: array
      required: true
  error_format:
    code: "SYNTHESIS_FAILED"
    reason: string
  constraints:
    - "Phải có citation [1] hoặc [source_name] trong answer nếu có chunks"
    - "Nếu retrieved_chunks=[] → phải abstain, không hallucinate"
    - "confidence < 0.4 → khuyến khích set hitl_triggered=True"
    - "Không được dùng kiến thức ngoài context được cung cấp"
  actual_implementation:
    status: "DONE Sprint 2"
    notes: ""

# ─────────────────────────────────────────────
# MCP Server
# ─────────────────────────────────────────────

mcp_server:
  name: mcp_server
  file: mcp_server.py
  description: >
    Real HTTP MCP Server (Sprint 3 Advanced Mode).
    FastAPI app running on http://localhost:8765.
    Endpoints: POST /tools/list, POST /tools/call.
    Client: mcp_client.py -- tries HTTP first, falls back to local dispatch.
  transport: "HTTP (FastAPI + uvicorn) with local in-process fallback"
  server_url: "http://localhost:8765"
  tools:
    search_kb:
      description: "Semantic search via ChromaDB"
      input:
        query: string  # required
        top_k: integer  # default: 3
      output:
        chunks: array
        sources: array
        total_found: integer
    get_ticket_info:
      description: "Jira ticket lookup (mock data)"
      input:
        ticket_id: string  # required (e.g., "P1-LATEST", "IT-1234", "IT-9847")
      output:
        ticket_id: string
        priority: string
        status: string
        assignee: string
        created_at: string
        sla_deadline: string
        notifications_sent: array
    check_access_permission:
      description: "Access Control SOP checker"
      input:
        access_level: integer  # 1, 2, or 3
        requester_role: string
        is_emergency: boolean  # default: false
      output:
        can_grant: boolean
        required_approvers: array
        emergency_override: boolean
        notes: array
        source: string
    create_ticket:
      description: "Create Jira ticket (MOCK)"
      input:
        priority: string  # P1, P2, P3, P4
        title: string
        description: string
      output:
        ticket_id: string
        url: string
        created_at: string
    validate_refund_eligibility:
      description: >
        [NEW Sprint 3] Compute refund eligibility from order_date + request_date.
        Handles Flash Sale exception, digital product exception, Policy v3/v4
        temporal scoping, and 7-working-day window. Prevents false positives
        from context_text keyword scanning.
      input:
        order_date: string    # YYYY-MM-DD or DD/MM/YYYY -- required
        request_date: string  # YYYY-MM-DD or DD/MM/YYYY -- required
        product_type: string  # physical | digital | license_key | subscription
        is_flash_sale: boolean
      output:
        eligible: boolean | null   # null means policy_v3 applies (unknown)
        exception_type: string | null
        reason: string
        days_elapsed: integer
        within_window: boolean
        policy_version: string
        source: string
    get_escalation_chain:
      description: >
        [NEW Sprint 3] Given ticket priority and minutes elapsed, compute
        full SLA escalation status: who to notify, channels, next deadlines,
        whether first_response SLA is breached.
      input:
        ticket_priority: string  # P1 or P2 -- required
        minutes_elapsed: integer # minutes since ticket created -- required
        current_time: string     # ISO timestamp (optional)
      output:
        should_escalate: boolean
        escalation_target: string | null
        notification_channels: array
        first_response_breached: boolean
        resolution_deadline: string
        remaining_minutes_to_resolution: integer
        next_stakeholder_update: string
        source: string
  constraints:
    - "dispatch_tool() must return error dict if tool not found"
    - "list_tools() must return MCP tool schema format"
    - "No exceptions propagate out of dispatch_tool()"
    - "HTTP /tools/call response follows MCP content array format"
    - "mcp_client.py falls back to local dispatch if HTTP server not running"
  actual_implementation:
    status: "DONE Sprint 3 (Advanced)"
    mode: "HTTP MCP server via FastAPI + uvicorn. Start: python mcp_server.py"
    bonus: "+2 (real HTTP server, not mock class)"
